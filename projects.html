<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Projects Gallery | DMA Maintenance Company PVT LTD</title>
<link rel="icon" href="images/logo.jpg" type="image/jpeg">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0a1628;
    --deep: #0d1f3c;
    --gold: #f5a623;
    --gold-light: #ffc85a;
    --white: #ffffff;
    --card-bg: #111e35;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); overflow-x: hidden; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 6%; background: rgba(10, 22, 40, 0.95);
    backdrop-filter: blur(12px); border-bottom: 1px solid rgba(245, 166, 35, 0.15);
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--white); }
  .nav-logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; line-height: 1.1; }
  .nav-logo-text span { color: var(--gold); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--gold); }

  /* TIMELINE HEADER */
  .timeline-header {
    padding: 140px 6% 60px; text-align: center;
    background: linear-gradient(180deg, var(--deep) 0%, var(--navy) 100%);
  }
  .timeline-header h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 6vw, 72px);
    letter-spacing: 2px; color: var(--gold); margin-bottom: 16px;
  }
  .timeline-header p { font-size: 16px; color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto; line-height: 1.6; }

  /* TIMELINE */
  .timeline {
    position: relative; max-width: 1200px; margin: 0 auto; padding: 40px 6%;
  }
  .timeline::before {
    content: ''; position: absolute; width: 4px; background: rgba(245, 166, 35, 0.2);
    top: 0; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 2px;
  }
  .timeline-item {
    padding: 20px 40px; position: relative; background-color: inherit; width: 50%;
    margin-bottom: 40px; opacity: 0; transform: translateY(20px); transition: opacity 0.5s, transform 0.5s;
  }
  .timeline-item.visible { opacity: 1; transform: translateY(0); }
  .timeline-item:nth-child(odd) { left: 0; text-align: right; }
  .timeline-item:nth-child(even) { left: 50%; text-align: left; }
  
  .timeline-dot {
    position: absolute; width: 24px; height: 24px; background-color: var(--gold);
    border: 4px solid var(--navy); border-radius: 50%; z-index: 1; top: 30px;
  }
  .timeline-item:nth-child(odd) .timeline-dot { right: -12px; }
  .timeline-item:nth-child(even) .timeline-dot { left: -12px; }

  .timeline-content {
    background: var(--card-bg); padding: 20px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08); display: inline-block; width: 100%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s, border-color 0.3s;
  }
  .timeline-content:hover { transform: translateY(-4px); border-color: rgba(245, 166, 35, 0.4); }
  
  .timeline-date {
    display: inline-block; background: rgba(245,166,35,0.15); color: var(--gold);
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
    margin-bottom: 16px; letter-spacing: 1px;
  }
  .timeline-image {
    width: 100%; object-fit: cover; border-radius: 12px; margin-bottom: 16px;
    background: rgba(255,255,255,0.05); /* placeholder background */
  }
  .single-image .timeline-image { height: 250px; }
  .project-image-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 16px;
  }
  .project-image-grid .timeline-image { height: 140px; margin-bottom: 0; }
  .timeline-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 8px; }

  /* LOADING */
  .loader {
    display: flex; justify-content: center; align-items: center; padding: 60px;
  }
  .loader-spinner {
    width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
    border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  /* FOOTER */
  footer { background: #060f1e; padding: 40px 6%; border-top: 1px solid rgba(255,255,255,0.07); text-align: center; }
  .footer-copy { font-size: 13px; color: rgba(255,255,255,0.35); }

  @media screen and (max-width: 768px) {
    .timeline::before { left: 31px; }
    .timeline-item { width: 100%; padding-left: 70px; padding-right: 0; text-align: left; }
    .timeline-item:nth-child(even) { left: 0%; }
    .timeline-item:nth-child(odd) .timeline-dot, .timeline-item:nth-child(even) .timeline-dot { left: 19px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="images/logo.jpg" alt="DMA Maintenance Logo" style="height: 44px; border-radius: 8px;">
    <div class="nav-logo-text">DMA <span>Maintenance</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#services">Services</a></li>
    <li><a href="projects.html" style="color: var(--gold);">Projects</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="timeline-header">
  <h1>Project Gallery</h1>
  <p>Explore our recent maintenance, repair, and installation projects. We take pride in delivering top-notch solutions for our clients.</p>
</div>

<div class="loader" id="loader"><div class="loader-spinner"></div></div>
<div class="timeline" id="timeline"></div>

<footer>
  <div class="footer-copy">&copy; 2024 DMA Maintenance Company PVT LTD. All rights reserved.</div>
</footer>

<script>
  const FOLDER_ID = '1rnIANQmEJR_GD4ruiLHDPYGyw2S-D0BR';
  const API_KEY = 'AIzaSyDrhKOOl2MKpphpsFJqWWax74x6QZFxepA';
  
  async function fetchProjects() {
    try {
      // Fetch files ordered by creation time descending (newest first)
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&key=${API_KEY}&fields=files(id,name,createdTime,thumbnailLink)&orderBy=createdTime+desc`);
      const data = await res.json();
      
      const timeline = document.getElementById('timeline');
      const loader = document.getElementById('loader');
      
      if (data.files && data.files.length > 0) {
        loader.style.display = 'none';
        
        // Group files by base project name
        const groups = {};
        data.files.forEach(file => {
          let rawTitle = file.name.replace(/\.[^/.]+$/, ""); // remove extension
          // Remove trailing numbers like " - 1", " 1", "_1"
          let baseTitle = rawTitle.replace(/[\s\-_]*\d+$/, "").trim();
          if (!baseTitle) baseTitle = rawTitle; // Fallback if name was just a number
          
          // Capitalize and format
          baseTitle = baseTitle.replace(/-/g, ' ').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());

          if(!groups[baseTitle]) {
             groups[baseTitle] = {
                date: file.createdTime, // first encountered is newest
                images: []
             };
          }
          groups[baseTitle].images.push(file);
        });

        Object.keys(groups).forEach(title => {
          const group = groups[title];
          const date = new Date(group.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
          
          let imagesHtml = '';
          const isMultiple = group.images.length > 1;
          const wrapperClass = isMultiple ? 'project-image-grid' : 'single-image';
          
          imagesHtml += `<div class="${wrapperClass}">`;
          group.images.forEach(imgFile => {
            // Use thumbnailLink for reliable embedding and replace size param for high res
            const imgSrc = imgFile.thumbnailLink ? imgFile.thumbnailLink.replace(/=s\d+$/, '=s1000') : `https://lh3.googleusercontent.com/d/${imgFile.id}=s1000`;
            imagesHtml += `<img src="${imgSrc}" alt="${title}" class="timeline-image" loading="lazy">`;
          });
          imagesHtml += `</div>`;

          const html = `
            <div class="timeline-item">
              <div class="timeline-dot"></div>
              <div class="timeline-content">
                <div class="timeline-date">${date}</div>
                ${imagesHtml}
                <div class="timeline-title">${title}</div>
              </div>
            </div>
          `;
          timeline.insertAdjacentHTML('beforeend', html);
        });

        // Simple intersection observer for reveal animation
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.timeline-item').forEach(item => observer.observe(item));

      } else {
        loader.innerHTML = '<p>No projects found in the gallery yet.</p>';
      }
    } catch (err) {
      console.error(err);
      document.getElementById('loader').innerHTML = '<p>Error loading projects. Please try again later.</p>';
    }
  }

  fetchProjects();
</script>
</body>
</html>
