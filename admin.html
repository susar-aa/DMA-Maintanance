<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | DMA Maintenance</title>
<link rel="icon" href="images/logo.jpg" type="image/jpeg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NFWEHJTVE7"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-NFWEHJTVE7');

<style>
  :root {
    --navy: #0a1628;
    --card-bg: #111e35;
    --gold: #f5a623;
    --white: #ffffff;
    --danger: #ff4757;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; padding: 40px 20px; }
  .admin-panel { background: var(--card-bg); padding: 40px; /* @media will override */ border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 800px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  h1, h2 { text-align: center; color: var(--gold); }
  h1 { font-size: 24px; margin-bottom: 24px; }
  h2 { font-size: 20px; margin-bottom: 16px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.7); }
  input[type="file"] { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; color: var(--white); cursor: pointer; }
  input[type="text"] { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--white); box-sizing: border-box; }
  button { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
  button:hover { background: #ffc85a; }
  button:disabled { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); cursor: not-allowed; }
  
  .btn-danger { background: var(--danger); color: white; width: auto; padding: 8px 16px; font-size: 13px; margin-top: 0; }
  .btn-danger:hover { background: #ff6b81; }

  .status { margin-top: 20px; font-size: 14px; text-align: center; }
  .status.success { color: #4CAF50; }
  .status.error { color: #ff4757; }
  .status.info { color: #3498db; }
  
  .auth-section { text-align: center; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }

  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-top: 20px; }
  .image-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
  .image-card img { width: 100%; height: 140px; object-fit: cover; }
  .image-card-info { padding: 12px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
  .image-card-name { font-size: 13px; font-weight: 600; word-break: break-all; }

  @media (max-width: 600px) {
    body { padding: 20px 10px; }
    .admin-panel { padding: 24px 16px; }
    .image-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>

<!-- Load Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Load Browser Image Compression -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

</head>
<body>

<div class="admin-panel">
  <h1>Upload Project Image</h1>
  
  <div class="auth-section">
    <p style="font-size: 14px; color: #aaa; margin-bottom: 12px;">You must sign in with the Google Account that owns the Drive folder to upload and manage images.</p>
    <button id="auth-btn" onclick="handleAuthClick()">Sign In with Google</button>
  </div>

  <div id="upload-section" style="display: none;">
    <div class="form-group">
      <label for="project-name">Project Name (Optional)</label>
      <input type="text" id="project-name" placeholder="e.g. Athurugiriya Plumbing Job">
      <small style="color: #888; font-size: 12px; display: block; margin-top: 6px;">If uploading multiple files, they will be numbered automatically.</small>
    </div>
    
    <div class="form-group">
      <label for="image-file">Select Image(s)</label>
      <!-- ADDED MULTIPLE ATTRIBUTE HERE -->
      <input type="file" id="image-file" accept="image/*" multiple>
    </div>

    <button id="upload-btn" onclick="handleUpload()">Compress & Upload</button>
    <div class="status" id="status-message"></div>
    
    <h2>Manage Uploaded Images</h2>
    <div style="text-align: right; margin-bottom: 12px;">
      <button onclick="fetchImages()" style="width: auto; padding: 8px 16px; font-size: 13px;">Refresh List</button>
    </div>
    <div class="image-grid" id="image-list">
      <!-- Images will appear here -->
    </div>
  </div>

  <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1);">
    <a href="https://analytics.google.com/analytics/web/" target="_blank" style="color: #3498db; text-decoration: none; font-size: 14px; font-weight: 600;">&#8599; View Google Analytics</a>
  </div>
</div>
<script>
  // Configuration
  const CLIENT_ID = '999869337660-54m34ig6dplonvrrv3bgl0hit6bp65d3.apps.googleusercontent.com';
  const FOLDER_ID = '1rnIANQmEJR_GD4ruiLHDPYGyw2S-D0BR';
  // Use full drive scope to ensure we can delete ANY file in the folder, not just ones created by the app.
  const SCOPES = 'https://www.googleapis.com/auth/drive';

  let tokenClient;
  let accessToken = null;

  window.onload = function () {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (tokenResponse) => {
        if (tokenResponse && tokenResponse.access_token) {
          accessToken = tokenResponse.access_token;
          document.getElementById('auth-btn').innerText = 'Signed In';
          document.getElementById('auth-btn').disabled = true;
          document.getElementById('upload-section').style.display = 'block';
          
          // Fetch existing images immediately after sign in
          fetchImages();
        }
      },
    });
  };

  function handleAuthClick() {
    tokenClient.requestAccessToken();
  }

  async function handleUpload() {
    const fileInput = document.getElementById('image-file');
    const nameInput = document.getElementById('project-name');
    const uploadBtn = document.getElementById('upload-btn');

    if (!fileInput.files.length) {
      showStatus('Please select at least one image.', 'error');
      return;
    }
    if (!accessToken) {
      showStatus('Please sign in first.', 'error');
      return;
    }

    try {
      uploadBtn.disabled = true;
      const totalFiles = fileInput.files.length;
      let successCount = 0;

      for (let i = 0; i < totalFiles; i++) {
        const file = fileInput.files[i];
        showStatus(`Processing image ${i + 1} of ${totalFiles}...`, 'info');

        let baseName = nameInput.value.trim();
        const extension = file.name.split('.').pop();
        
        // Number the files if multiple are uploaded
        if (totalFiles > 1 && baseName) {
            baseName = `${baseName} - ${i + 1}`;
        } else if (!baseName) {
            // If no project name provided, use original filename
            baseName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
        }
        
        const finalFileName = `${baseName}.${extension}`;

        // Compress Image
        const options = {
          maxSizeMB: 1, // Compress to max 1MB
          maxWidthOrHeight: 1920,
          useWebWorker: true
        };
        
        const compressedFile = await imageCompression(file, options);
        console.log(`Original: ${(file.size/1024/1024).toFixed(2)} MB, Compressed: ${(compressedFile.size/1024/1024).toFixed(2)} MB`);

        showStatus(`Uploading image ${i + 1} of ${totalFiles}...`, 'info');

        // Upload to Google Drive via REST API (Multipart upload)
        const metadata = {
          name: finalFileName,
          parents: [FOLDER_ID]
        };

        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', compressedFile);

        const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + accessToken
          },
          body: form
        });

        if (res.ok) {
          successCount++;
        } else {
          const err = await res.json();
          console.error('Upload failed for file', finalFileName, err);
        }
      }

      if (successCount === totalFiles) {
        showStatus(`Successfully uploaded ${successCount} image(s)!`, 'success');
        fileInput.value = '';
        nameInput.value = '';
        // Refresh the image list
        fetchImages();
      } else {
        showStatus(`Uploaded ${successCount} out of ${totalFiles} images. Check console for errors.`, 'error');
      }

    } catch (error) {
      console.error(error);
      showStatus('An error occurred during upload.', 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  }

  // Fetch images for management
  async function fetchImages() {
    if (!accessToken) return;
    
    const listEl = document.getElementById('image-list');
    listEl.innerHTML = '<p style="font-size: 14px; color: #888;">Loading images...</p>';
    
    try {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'image/'&fields=files(id,name,thumbnailLink)&orderBy=createdTime+desc`, {
        headers: {
          'Authorization': 'Bearer ' + accessToken
        }
      });
      
      const data = await res.json();
      
      if (data.files && data.files.length > 0) {
        listEl.innerHTML = '';
        data.files.forEach(file => {
          const card = document.createElement('div');
          card.className = 'image-card';
          // Drive API thumbnailLink is available for images
          card.innerHTML = `
            <img src="${file.thumbnailLink}" alt="${file.name}">
            <div class="image-card-info">
              <div class="image-card-name">${file.name}</div>
              <button class="btn-danger" onclick="deleteImage('${file.id}')">Delete</button>
            </div>
          `;
          listEl.appendChild(card);
        });
      } else {
        listEl.innerHTML = '<p style="font-size: 14px; color: #888; grid-column: 1/-1;">No images found in the project folder.</p>';
      }
    } catch (err) {
      console.error(err);
      listEl.innerHTML = '<p style="font-size: 14px; color: #ff4757; grid-column: 1/-1;">Failed to load images.</p>';
    }
  }

  // Delete an image
  async function deleteImage(fileId) {
    if (!confirm('Are you sure you want to delete this image from Google Drive? This cannot be undone.')) {
      return;
    }
    
    if (!accessToken) return;
    
    try {
      showStatus('Deleting image...', 'info');
      
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
        method: 'DELETE',
        headers: {
          'Authorization': 'Bearer ' + accessToken
        }
      });
      
      if (res.ok) {
        showStatus('Image deleted successfully.', 'success');
        // Refresh the list
        fetchImages();
      } else {
        const err = await res.json();
        console.error(err);
        showStatus('Failed to delete image: ' + (err.error.message || 'Unknown error'), 'error');
      }
    } catch (err) {
      console.error(err);
      showStatus('An error occurred while deleting.', 'error');
    }
  }

  function showStatus(msg, type) {
    const statusEl = document.getElementById('status-message');
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }
</script>

</body>
</html>
