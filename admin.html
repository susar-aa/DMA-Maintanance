<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard | DMA Maintenance</title>
<link rel="icon" href="images/logo.jpg" type="image/jpeg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>

  window.dataLayer = window.dataLayer || [];

<style>
  :root {
    --navy: #0a1628;
    --card-bg: #111e35;
    --gold: #f5a623;
    --white: #ffffff;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .admin-panel { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  h1 { font-size: 24px; margin-bottom: 24px; text-align: center; color: var(--gold); }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.7); }
  input[type="file"] { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); border-radius: 8px; color: var(--white); cursor: pointer; }
  input[type="text"] { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--white); box-sizing: border-box; }
  button { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: 8px; font-weight: 700; font-size: 16px; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
  button:hover { background: #ffc85a; }
  button:disabled { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); cursor: not-allowed; }
  .status { margin-top: 20px; font-size: 14px; text-align: center; }
  .status.success { color: #4CAF50; }
  .status.error { color: #f44336; }
  
  .auth-section { text-align: center; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
</style>

<!-- Load Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Load Browser Image Compression -->
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

</head>
<body>

<div class="admin-panel">
  <h1>Upload Project Image</h1>
  
  <div class="auth-section">
    <p style="font-size: 14px; color: #aaa; margin-bottom: 12px;">You must sign in with the Google Account that owns the Drive folder to upload images.</p>
    <button id="auth-btn" onclick="handleAuthClick()">Sign In with Google</button>
  </div>

  <div id="upload-section" style="display: none;">
    <div class="form-group">
      <label for="project-name">Project Name</label>
      <input type="text" id="project-name" placeholder="e.g. Malabe Plumbing Job">
    </div>
    
    <div class="form-group">
      <label for="image-file">Select Image</label>
      <input type="file" id="image-file" accept="image/*">
    </div>

    <button id="upload-btn" onclick="handleUpload()">Compress & Upload</button>
    <div class="status" id="status-message"></div>
  </div>
</div>

<script>
  // Configuration
  const CLIENT_ID = 'YOUR_GOOGLE_OAUTH_CLIENT_ID'; // The user needs to create an OAuth Client ID in Google Cloud Console
  const FOLDER_ID = '1rnIANQmEJR_GD4ruiLHDPYGyw2S-D0BR';
  const SCOPES = 'https://www.googleapis.com/auth/drive.file';

  let tokenClient;
  let accessToken = null;

  window.onload = function () {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: (tokenResponse) => {
        if (tokenResponse && tokenResponse.access_token) {
          accessToken = tokenResponse.access_token;
          document.getElementById('auth-btn').innerText = 'Signed In';
          document.getElementById('auth-btn').disabled = true;
          document.getElementById('upload-section').style.display = 'block';
        }
      },
    });
  };

  function handleAuthClick() {
    if (CLIENT_ID === 'YOUR_GOOGLE_OAUTH_CLIENT_ID') {
      alert("Please configure your Google OAuth Client ID in the admin.html file.");
      return;
    }
    tokenClient.requestAccessToken();
  }

  async function handleUpload() {
    const fileInput = document.getElementById('image-file');
    const nameInput = document.getElementById('project-name');
    const statusMsg = document.getElementById('status-message');
    const uploadBtn = document.getElementById('upload-btn');

    if (!fileInput.files.length) {
      showStatus('Please select an image first.', 'error');
      return;
    }
    if (!accessToken) {
      showStatus('Please sign in first.', 'error');
      return;
    }

    const file = fileInput.files[0];
    const projectName = nameInput.value.trim() || file.name;
    const extension = file.name.split('.').pop();
    const finalFileName = `${projectName}.${extension}`;

    try {
      uploadBtn.disabled = true;
      showStatus('Compressing image...', '');

      // Compress Image
      const options = {
        maxSizeMB: 1, // Compress to max 1MB
        maxWidthOrHeight: 1920,
        useWebWorker: true
      };
      
      const compressedFile = await imageCompression(file, options);
      console.log(`Original: ${(file.size/1024/1024).toFixed(2)} MB, Compressed: ${(compressedFile.size/1024/1024).toFixed(2)} MB`);

      showStatus('Uploading to Google Drive...', '');

      // Upload to Google Drive via REST API (Multipart upload)
      const metadata = {
        name: finalFileName,
        parents: [FOLDER_ID]
      };

      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
      form.append('file', compressedFile);

      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + accessToken
        },
        body: form
      });

      if (res.ok) {
        showStatus('Upload successful!', 'success');
        fileInput.value = '';
        nameInput.value = '';
      } else {
        const err = await res.json();
        showStatus('Upload failed: ' + (err.error.message || 'Unknown error'), 'error');
      }
    } catch (error) {
      console.error(error);
      showStatus('An error occurred during upload.', 'error');
    } finally {
      uploadBtn.disabled = false;
    }
  }

  function showStatus(msg, type) {
    const statusEl = document.getElementById('status-message');
    statusEl.textContent = msg;
    statusEl.className = 'status ' + type;
  }
</script>

</body>
</html>
